<!DOCTYPE html>
<html>
<head>
  <title>JuicePOS Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: Arial; margin:0; background:#f2f2f2; }
    header { background:green; color:#fff; padding:15px; text-align:center; }
    input, button { padding:10px; margin:5px; }
    button { background:green; color:white; border:none; }
    .hidden { display:none; }
    nav button { margin:5px; }
  </style>
</head>

<body>

<header>JuicePOS Pro</header>

<!-- LOGIN -->
<div id="login">
  <h2>Login</h2>
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <button onclick="loginUser()">Login</button>
  <button onclick="showSetup()">First Setup</button>
</div>

<!-- SETUP -->
<div id="setup" class="hidden">
  <h2>Create Admin</h2>
  <input id="newUser" placeholder="Username">
  <input id="newPass" type="password" placeholder="Password">
  <button onclick="createAdmin()">Create Admin</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

  <nav>
    <button onclick="showPage('sales')">Sales</button>
    <button onclick="showPage('banking')">Banking</button>
    <button onclick="showPage('reports')">Reports</button>
    <button onclick="logout()">Logout</button>
  </nav>

  <!-- SALES -->
  <div id="sales">
    <h2>Sales</h2>
    <input id="product" placeholder="Product name">
    <input id="price" type="number" placeholder="Price">
    <button onclick="addItem()">Add</button>

    <ul id="list"></ul>

    <h3>Total: GMD <span id="total">0</span></h3>
    <button onclick="checkout()">Checkout</button>
  </div>

  <!-- BANKING -->
  <div id="banking" class="hidden">
    <h2>Banking</h2>
    <p>Cash: GMD <span id="cashTotal">0</span></p>
    <p>Wave: GMD <span id="waveTotal">0</span></p>
    <p>Bank: GMD <span id="bankTotal">0</span></p>
  </div>

  <!-- REPORTS -->
  <div id="reports" class="hidden">
    <h2>Reports</h2>
    <p>Total Today: GMD <span id="reportTotal">0</span></p>
    <p id="fraud"></p>
  </div>

</div>

<script>

// STORAGE
let users = JSON.parse(localStorage.getItem('users') || '[]');
let currentUser = null;
let cart = [];

let totals = JSON.parse(localStorage.getItem('totals') || '{"cash":0,"wave":0,"bank":0}');
let salesLog = JSON.parse(localStorage.getItem('salesLog') || '[]');

// DATE
function today(){
  return new Date().toISOString().split('T')[0];
}

// LOGIN
function showSetup(){
  document.getElementById('setup').classList.remove('hidden');
}

function createAdmin(){
  let u = newUser.value.trim();
  let p = newPass.value.trim();

  if(!u || !p){
    alert("Enter username and password");
    return;
  }

  users.push({u,p});
  localStorage.setItem('users', JSON.stringify(users));

  alert("Admin created. Now login.");
}

function loginUser(){
  let u = username.value.trim();
  let p = password.value.trim();

  let user = users.find(x => x.u === u && x.p === p);

  if(user){
    currentUser = user;
    document.getElementById('login').style.display = 'none';
    document.getElementById('app').classList.remove('hidden');
    updateBanking();
    updateReports();
  } else {
    alert("Invalid login");
  }
}

function logout(){
  location.reload();
}

// NAV
function showPage(page){
  document.getElementById('sales').classList.add('hidden');
  document.getElementById('banking').classList.add('hidden');
  document.getElementById('reports').classList.add('hidden');

  document.getElementById(page).classList.remove('hidden');
}

// SALES
function addItem(){
  let p = product.value.trim();
  let pr = Number(price.value);

  if(!p || pr <= 0){
    alert("Enter valid data");
    return;
  }

  cart.push({p, pr});
  list.innerHTML += `<li>${p} - ${pr}</li>`;

  product.value = '';
  price.value = '';

  updateTotal();
}

function updateTotal(){
  let t = cart.reduce((a,b)=>a+b.pr,0);
  total.innerText = t;
}

// CHECKOUT
function checkout(){
  if(cart.length === 0){
    alert("No items");
    return;
  }

  let method = prompt("cash / wave / bank");
  if(!method) return;

  method = method.toLowerCase();

  let t = cart.reduce((a,b)=>a+b.pr,0);
  let actualCash = null;

  if(method === 'cash'){
    actualCash = Number(prompt("Enter physical cash"));
    if(isNaN(actualCash)) return;
    totals.cash += t;
  }
  else if(method === 'wave'){
    totals.wave += t;
  }
  else if(method === 'bank'){
    totals.bank += t;
  }
  else{
    alert("Invalid method");
    return;
  }

  salesLog.push({
    date: today(),
    user: currentUser.u,
    total: t,
    method,
    expectedCash: method === 'cash' ? t : 0,
    actualCash
  });

  localStorage.setItem('salesLog', JSON.stringify(salesLog));
  localStorage.setItem('totals', JSON.stringify(totals));

  cart = [];
  list.innerHTML = '';
  total.innerText = 0;

  updateBanking();
  updateReports();

  alert("Sale saved");
}

// BANKING
function updateBanking(){
  cashTotal.innerText = totals.cash;
  waveTotal.innerText = totals.wave;
  bankTotal.innerText = totals.bank;
}

// REPORTS
function updateReports(){
  let totalAll = totals.cash + totals.wave + totals.bank;
  reportTotal.innerText = totalAll;

  let todaySales = salesLog.filter(s => s.date === today());

  let fraud = todaySales.some(s =>
    s.method === 'cash' && s.actualCash < s.expectedCash
  );

  fraud.innerText = fraud ? "⚠️ Cash mismatch detected!" : "";
}

</script>

</body>
</html>
