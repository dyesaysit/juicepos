<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JuicePOS Pro</title>

<style>
body { font-family: Arial; margin:0; background:#f4f4f4; }
header { background:#006400; color:white; padding:15px; text-align:center; }

.page { display:none; padding:10px; }
.page.active { display:block; }

.bottom-nav {
  position:fixed; bottom:0; left:0; right:0;
  display:flex; background:white; border-top:1px solid #ccc;
}
.bottom-nav button {
  flex:1; padding:10px; border:none; background:none;
}
.bottom-nav button.active { color:green; font-weight:bold; }

input { padding:10px; width:100%; margin:5px 0; }
button { padding:10px; margin:5px 0; }

.cart-item {
  display:flex; justify-content:space-between;
  padding:8px; background:white; margin-bottom:5px;
}

.action-bar {
  position:fixed;
  bottom:60px;
  left:0; right:0;
  background:white;
  padding:10px;
  display:flex;
  gap:10px;
}

.total {
  font-size:20px;
  font-weight:bold;
  margin-top:10px;
}
</style>
</head>

<body>

<header>JuicePOS Pro</header>

<!-- LOGIN -->
<div id="loginPage" class="page active">
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <button onclick="firstSetup()">First Setup</button>
</div>

<!-- SETUP -->
<div id="setupPage" class="page">
  <input id="newUser" placeholder="Username">
  <input id="newPass" type="password" placeholder="Password">
  <button onclick="createAdmin()">Create Admin</button>
</div>

<!-- SELL -->
<div id="sellPage" class="page">
  <input id="search" placeholder="Search..." oninput="searchProduct(this.value)">
  <div id="searchResults"></div>

  <h3>Cart</h3>
  <div id="cart"></div>

  <div class="total">Total: GHS <span id="total">0</span></div>

  <div class="action-bar">
    <button onclick="clearCart()">Clear</button>
    <button onclick="cashOut()">Cash Out</button>
    <button onclick="charge()">Charge</button>
  </div>
</div>

<!-- STOCK -->
<div id="stockPage" class="page">
  <input id="pname" placeholder="Product">
  <input id="pprice" placeholder="Price">
  <button onclick="addProduct()">Add</button>
  <div id="productList"></div>
</div>

<!-- SALES -->
<div id="salesPage" class="page">
  <h3>Sales</h3>
  <div id="salesList"></div>

  <h3>Daily Report</h3>
  <div id="report"></div>

  <input id="actualCash" placeholder="Enter physical cash">
  <button onclick="checkFraud()">Check Cash</button>
</div>

<!-- NAV -->
<div class="bottom-nav">
  <button onclick="nav('sellPage')">Sell</button>
  <button onclick="nav('stockPage')">Stock</button>
  <button onclick="nav('salesPage')">Sales</button>
</div>

<script>

// STORAGE
const save=(k,v)=>localStorage.setItem(k,JSON.stringify(v))
const load=(k)=>JSON.parse(localStorage.getItem(k))

// STATE
let users = load("users")||[]
let products = load("products")||[]
let cart = []
let sales = load("sales")||[]
let session = load("session")

// AUTO LOGIN
window.onload = ()=>{
  if(session) showApp()
}

// NAV
function nav(p){
  document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"))
  document.getElementById(p).classList.add("active")

  if(p==="salesPage") renderSales()
}

// AUTH
function login(){
  let u=username.value, p=password.value
  let user=users.find(x=>x.u==u&&x.p==p)
  if(!user) return alert("Invalid")

  session=user
  save("session",user)
  showApp()
}

function firstSetup(){ nav("setupPage") }

function createAdmin(){
  users.push({u:newUser.value,p:newPass.value})
  save("users",users)
  alert("Created")
  nav("loginPage")
}

// SHOW
function showApp(){
  loginPage.style.display="none"
  setupPage.style.display="none"
  nav("sellPage")
  renderProducts()
}

// PRODUCTS
function addProduct(){
  products.push({
    id:Date.now(),
    name:pname.value,
    price:+pprice.value
  })
  save("products",products)
  renderProducts()
}

function renderProducts(){
  productList.innerHTML=products.map(p=>`
    <div>${p.name} - ${p.price}</div>
  `).join("")
}

// SEARCH
function searchProduct(q){
  let r=products.filter(p=>p.name.toLowerCase().includes(q.toLowerCase()))
  searchResults.innerHTML=r.map(p=>`
    <div onclick="addToCart(${p.id})">${p.name} - ${p.price}</div>
  `).join("")
}

// CART
function addToCart(id){
  let p=products.find(x=>x.id==id)
  let e=cart.find(c=>c.id==id)
  e?e.qty++:cart.push({...p,qty:1})
  renderCart()
}

function renderCart(){
  cart.innerHTML=cart.map(c=>`
    <div class="cart-item">
      ${c.name} x${c.qty}
      <span>${c.qty*c.price}</span>
    </div>
  `).join("")

  total.innerText=cart.reduce((s,i)=>s+i.qty*i.price,0)
}

// ACTIONS
function clearCart(){ cart=[]; renderCart() }

function charge(){
  if(!cart.length) return alert("Empty")

  let sale={
    items:cart,
    total:cart.reduce((s,i)=>s+i.qty*i.price,0),
    user:session.u,
    date:new Date()
  }

  sales.push(sale)
  save("sales",sales)

  generateReceipt(sale)

  cart=[]
  renderCart()
}

// WHATSAPP RECEIPT
function generateReceipt(sale){
  let text=`Receipt\n\n`
  sale.items.forEach(i=>{
    text+=`${i.name} x${i.qty} = ${i.qty*i.price}\n`
  })
  text+=`\nTotal: ${sale.total}`

  let url="https://wa.me/?text="+encodeURIComponent(text)
  window.open(url)
}

// SALES + REPORT
function renderSales(){
  salesList.innerHTML=sales.map(s=>`
    <div>${s.user} - ${s.total}</div>
  `).join("")

  let today=new Date().toDateString()

  let userSales=sales.filter(s=>
    new Date(s.date).toDateString()==today &&
    s.user==session.u
  )

  let total=userSales.reduce((s,i)=>s+i.total,0)

  report.innerHTML=`Today Total: ${total}`
}

// FRAUD CHECK
function checkFraud(){
  let actual=+actualCash.value

  let today=new Date().toDateString()
  let expected=sales
    .filter(s=>new Date(s.date).toDateString()==today)
    .reduce((s,i)=>s+i.total,0)

  if(actual!==expected){
    alert("⚠️ Mismatch! Expected: "+expected+" Got: "+actual)
  } else {
    alert("Cash OK")
  }
}

// CASH OUT
function cashOut(){
  alert("Cash removed recorded")
}

</script>

</body>
</html>
