<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JuicePOS Pro</title>

<style>
body { font-family: Arial; margin:0; background:#f4f4f4; }
header { background:#006400; color:white; padding:15px; text-align:center; font-weight:bold; }

.page { display:none; padding:10px; }
.page.active { display:block; }

.bottom-nav {
  position:fixed; bottom:0; left:0; right:0;
  display:flex; background:white; border-top:1px solid #ccc;
}
.bottom-nav button {
  flex:1; padding:10px; border:none; background:none;
}
.bottom-nav button.active { color:green; font-weight:bold; }

input { padding:10px; width:100%; margin:5px 0; }
button { padding:10px; margin:5px 0; }

.cart-item {
  display:flex; justify-content:space-between;
  padding:8px; background:white; margin-bottom:5px;
}

.action-bar {
  position:fixed;
  bottom:60px;
  left:0; right:0;
  background:white;
  padding:10px;
  display:flex;
  gap:10px;
}
.action-bar button { flex:1; }
</style>
</head>

<body>

<header>JuicePOS Pro</header>

<!-- LOGIN -->
<div id="loginPage" class="page active">
  <h3>Login</h3>
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <button onclick="firstSetup()">First Setup</button>
</div>

<!-- SETUP -->
<div id="setupPage" class="page">
  <h3>Create Admin</h3>
  <input id="newUser" placeholder="Username">
  <input id="newPass" type="password" placeholder="Password">
  <button onclick="createAdmin()">Create</button>
</div>

<!-- SELL -->
<div id="sellPage" class="page">
  <input id="search" placeholder="Search product..." oninput="searchProduct(this.value)">
  <div id="searchResults"></div>

  <h3>Cart</h3>
  <div id="cart"></div>

  <div class="action-bar">
    <button onclick="clearCart()">Clear</button>
    <button onclick="cashOut()">Cash Out</button>
    <button onclick="charge()">Charge</button>
  </div>
</div>

<!-- STOCK -->
<div id="stockPage" class="page">
  <h3>Stock</h3>
  <input id="pname" placeholder="Product">
  <input id="pprice" placeholder="Price">
  <button onclick="addProduct()">Add Product</button>
  <div id="productList"></div>
</div>

<!-- SALES -->
<div id="salesPage" class="page">
  <h3>Sales</h3>
  <div id="salesList"></div>
</div>

<!-- NAV -->
<div class="bottom-nav">
  <button onclick="nav('sellPage')">Sell</button>
  <button onclick="nav('stockPage')">Stock</button>
  <button onclick="nav('salesPage')">Sales</button>
</div>

<script>

// STORAGE
function save(key,val){ localStorage.setItem(key,JSON.stringify(val)) }
function load(key){ return JSON.parse(localStorage.getItem(key)) }

// STATE
let users = load("users") || []
let products = load("products") || []
let cart = []
let sales = load("sales") || []
let currentUser = load("session")

// AUTO LOGIN
window.onload = ()=>{
  if(currentUser){
    showApp()
  }
}

// NAVIGATION
function nav(page){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))
  document.getElementById(page).classList.add("active")
}

// AUTH
function login(){
  let u = username.value
  let p = password.value

  let user = users.find(x=>x.u==u && x.p==p)
  if(!user) return alert("Invalid")

  currentUser = user
  save("session", user)

  showApp()
}

function firstSetup(){
  nav("setupPage")
}

function createAdmin(){
  let u = newUser.value
  let p = newPass.value

  users.push({u,p})
  save("users",users)

  alert("Created. Login now")
  nav("loginPage")
}

// SHOW APP
function showApp(){
  document.getElementById("loginPage").style.display="none"
  document.getElementById("setupPage").style.display="none"
  document.getElementById("sellPage").classList.add("active")

  renderProducts()
  renderCart()
}

// PRODUCTS
function addProduct(){
  let p = {
    id: Date.now(),
    name: pname.value,
    price: parseFloat(pprice.value)
  }

  products.push(p)
  save("products",products)

  renderProducts()
}

function renderProducts(){
  productList.innerHTML = products.map(p=>`
    <div>${p.name} - ${p.price}</div>
  `).join("")
}

// SEARCH + SELL
function searchProduct(q){
  let result = products.filter(p=>p.name.toLowerCase().includes(q.toLowerCase()))

  searchResults.innerHTML = result.map(p=>`
    <div onclick="addToCart(${p.id})">${p.name} - ${p.price}</div>
  `).join("")
}

function addToCart(id){
  let p = products.find(x=>x.id==id)

  let existing = cart.find(c=>c.id==id)
  if(existing) existing.qty++
  else cart.push({...p, qty:1})

  renderCart()
}

function renderCart(){
  cartEl = document.getElementById("cart")

  cartEl.innerHTML = cart.map(c=>`
    <div class="cart-item">
      ${c.name} x${c.qty}
      <span>${c.price * c.qty}</span>
    </div>
  `).join("")
}

// ACTIONS
function clearCart(){
  cart=[]
  renderCart()
}

function charge(){
  if(!cart.length) return alert("Empty")

  sales.push({items:cart, date:new Date()})
  save("sales",sales)

  cart=[]
  renderCart()
  renderSales()

  alert("Sale complete")
}

function cashOut(){
  alert("Cash out recorded")
}

// SALES
function renderSales(){
  salesList.innerHTML = sales.map(s=>`
    <div>${s.items.length} items - ${new Date(s.date).toLocaleString()}</div>
  `).join("")
}

</script>

</body>
</html>
