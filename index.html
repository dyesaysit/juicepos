<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>JuicePOS</title>

<style>
:root {
  --primary:#006400;
  --bg:#f0f4f0;
  --surface:#ffffff;
  --border:#d0e0d0;
  --text:#1a2e1a;
  --danger:#c0392b;
  --warning:#e67e22;
  --radius:12px;
  --tab-h:56px;
}

body {
  margin:0;
  font-family:system-ui;
  background:var(--bg);
}

/* ===== FIXED ACTION BAR (UPDATED) ===== */
#sell-action-bar {
  position: fixed;
  left: 0;
  right: 0;

  /* PUSHED HIGHER */
  bottom: calc(var(--tab-h) + 18px);

  background: var(--surface);
  border-top: 2px solid var(--primary);

  padding: 10px 12px;

  z-index: 200;
  box-shadow: 0 -6px 16px rgba(0,0,0,0.12);
}

/* ===== ENSURE NAV BELOW ===== */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: var(--tab-h);
  background: white;
  border-top: 1px solid var(--border);
  display:flex;
  z-index:100;
}

/* ===== OPTIONAL SMALL SCREEN BOOST ===== */
@media (max-height:700px){
  #sell-action-bar{
    bottom: calc(var(--tab-h) + 24px);
  }
}

button{
  border:none;
  border-radius:8px;
  padding:10px;
  font-weight:bold;
}

/* DEMO BUTTON STYLE */
.btn-danger{background:#fadbd8;color:#c0392b;}
.btn-warning{background:#fdebd0;color:#e67e22;}
.btn-primary{background:#006400;color:#fff;}

</style>
</head>

<body>

<!-- SELL ACTION BAR -->
<div id="sell-action-bar">
  <div style="display:flex;gap:8px;">
    <button class="btn-danger">🗑</button>
    <button class="btn-warning">💸 Cash Out</button>
    <button class="btn-primary" style="flex:1;">✅ Charge</button>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <div style="flex:1;text-align:center;">Sell</div>
  <div style="flex:1;text-align:center;">Stock</div>
  <div style="flex:1;text-align:center;">Sales</div>
  <div style="flex:1;text-align:center;">Banking</div>
  <div style="flex:1;text-align:center;">More</div>
</div>

</body>
</html>
