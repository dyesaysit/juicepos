<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JuicePOS</title>

<style>
:root{
  --primary:#006400;
  --primary-dark:#004d00;
  --danger:#c0392b;
  --danger-light:#fadbd8;
  --warning:#e67e22;
  --warning-light:#fdebd0;
  --bg:#f4f6f4;
}
body{margin:0;font-family:Arial;background:var(--bg);}

#sell-action-bar{
  position:fixed;
  bottom:70px;
  left:0;
  right:0;
  background:white;
  padding:10px;
  border-top:2px solid var(--primary);
}

/* 🔥 NEW BUTTON LAYOUT */
.action-buttons{
  display:flex;
  gap:10px;
}

.action-buttons button{
  border:none;
  border-radius:10px;
  font-weight:bold;
}

/* Individual buttons */
.clear-btn{
  width:50px;
  height:50px;
  background:var(--danger-light);
  color:var(--danger);
  font-size:20px;
}

.cashout-btn{
  padding:0 16px;
  background:var(--warning-light);
  color:var(--warning);
  border:2px solid var(--warning);
}

.charge-btn{
  flex:1;
  height:55px;
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  color:white;
  font-size:16px;
  transform:translateY(-8px); /* 🔥 lifted */
}
</style>
</head>

<body>

<!-- SELL PAGE ONLY (rest of your app remains same logic) -->
<div id="page-sell">

  <!-- CART AREA -->
  <div id="cart" style="padding:20px;">
    Cart Items Appear Here
  </div>

  <!-- ACTION BAR -->
  <div id="sell-action-bar">

    <div class="action-buttons">

      <button class="clear-btn" onclick="clearCart()">🗑</button>

      <button class="cashout-btn" onclick="openCashOut()">
        💸 Cash Out
      </button>

      <button class="charge-btn" onclick="openCartPayment()">
        ✅ Charge
      </button>

    </div>

  </div>

</div>

<script>
function clearCart(){
  alert("Cart cleared");
}

function openCashOut(){
  alert("Cash out opened");
}

function openCartPayment(){
  alert("Charge triggered");
}
</script>

</body>
</html>
