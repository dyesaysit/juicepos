<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JuicePOS</title>

<style>
:root{
  --primary:#006400;
  --bg:#f4f6f4;
  --surface:#fff;
  --tab-h:60px;
}

body{margin:0;font-family:sans-serif;background:var(--bg);}

/* PAGES */
.page{display:none;}
.page.active{display:flex;flex-direction:column;height:100vh;}

#page-sell{
  padding-bottom:130px;
}

/* HEADER */
.header{
  padding:10px;
  background:var(--primary);
  color:#fff;
}

/* CART */
#cart{
  flex:1;
  overflow:auto;
  padding:10px;
}

.item{
  display:flex;
  justify-content:space-between;
  margin-bottom:8px;
  background:#fff;
  padding:8px;
  border-radius:8px;
}

/* ACTION BAR */
#action-bar{
  position:fixed;
  left:0; right:0;
  bottom:calc(var(--tab-h) + 12px);
  background:#fff;
  padding:10px;
  display:flex;
  gap:10px;
  z-index:999;
  box-shadow:0 -4px 10px rgba(0,0,0,0.1);
}

button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
  background:var(--primary);
  color:#fff;
  font-weight:bold;
}

/* NAV */
.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:var(--tab-h);
  display:flex;
  background:#fff;
  border-top:1px solid #ccc;
}

.tab{
  flex:1;
  text-align:center;
  padding:10px;
  font-size:12px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="auth">
  <h2>Login</h2>
  <input id="user" placeholder="Username"><br><br>
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div id="page-sell" class="page active">
  <div class="header">Sell</div>

  <div id="cart"></div>

  <div id="action-bar">
    <button onclick="clearCart()">Clear</button>
    <button onclick="cashOut()">Cash Out</button>
    <button onclick="charge()">Charge</button>
  </div>
</div>

<div id="page-inventory" class="page">
  <div class="header">Stock</div>
  <div id="stock-list"></div>
  <button onclick="addProduct()">+ Add Product</button>
</div>

<div id="page-sales" class="page">
  <div class="header">Sales</div>
  <div id="sales-list"></div>
</div>

<div id="page-banking" class="page">
  <div class="header">Banking</div>
  <div id="bank-info"></div>
</div>

<div id="page-accounting" class="page">
  <div class="header">Finance</div>
  <div id="finance"></div>
</div>

<div id="page-settings" class="page">
  <div class="header">More</div>
  <button onclick="logout()">Logout</button>
</div>

<div class="bottom-nav">
  <div class="tab" onclick="go('sell')">Sell</div>
  <div class="tab" onclick="go('inventory')">Stock</div>
  <div class="tab" onclick="go('sales')">Sales</div>
  <div class="tab" onclick="go('banking')">Banking</div>
  <div class="tab" onclick="go('accounting')">Finance</div>
  <div class="tab" onclick="go('settings')">More</div>
</div>

</div>

<script>

/* STORAGE */
const DB={
  get:k=>JSON.parse(localStorage.getItem(k)||"null"),
  set:(k,v)=>localStorage.setItem(k,JSON.stringify(v))
};

let APP={
  user:null,
  cart:[],
  products:DB.get('products')||[],
  sales:DB.get('sales')||[],
  cash:0
};

/* LOGIN */
function login(){
  const u=document.getElementById('user').value;
  if(!u)return;
  APP.user={name:u};
  DB.set('user',APP.user);
  boot();
}

/* BOOT */
function boot(){
  const saved=DB.get('user');
  if(saved){
    APP.user=saved;
    document.getElementById('auth').style.display='none';
    document.getElementById('app').style.display='block';
    renderAll();
  }
}

/* NAV */
function go(p){
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
}

/* PRODUCTS */
function addProduct(){
  const name=prompt("Product name");
  const price=+prompt("Price");
  if(!name||!price)return;
  APP.products.push({name,price});
  DB.set('products',APP.products);
  renderStock();
}

/* STOCK */
function renderStock(){
  const el=document.getElementById('stock-list');
  el.innerHTML=APP.products.map(p=>`
    <div class="item">
      ${p.name} - GHS ${p.price}
      <button onclick='addToCart("${p.name}")'>Sell</button>
    </div>
  `).join('');
}

/* CART */
function addToCart(name){
  const p=APP.products.find(x=>x.name===name);
  const item=APP.cart.find(x=>x.name===name);
  if(item){item.qty++}else{APP.cart.push({...p,qty:1})}
  renderCart();
}

function renderCart(){
  const el=document.getElementById('cart');
  let total=0;

  el.innerHTML=APP.cart.map(i=>{
    total+=i.price*i.qty;
    return `<div class="item">${i.name} x${i.qty} - ${i.price*i.qty}</div>`;
  }).join('') + `<h3>Total: GHS ${total}</h3>`;
}

/* CLEAR */
function clearCart(){
  APP.cart=[];
  renderCart();
}

/* CHARGE */
function charge(){
  let total=APP.cart.reduce((t,i)=>t+i.price*i.qty,0);
  if(!total)return alert("No items");

  APP.sales.push({
    items:APP.cart,
    total,
    user:APP.user.name,
    date:new Date().toLocaleString()
  });

  DB.set('sales',APP.sales);
  APP.cash+=total;

  whatsappReceipt(total);

  clearCart();
  renderSales();
}

/* CASH OUT + FRAUD CHECK */
function cashOut(){
  const actual=+prompt("Enter actual cash in hand");
  if(!actual)return;

  if(actual!==APP.cash){
    alert("⚠️ Cash mismatch detected!");
  }else{
    alert("Cash balanced");
  }

  APP.cash=0;
}

/* SALES */
function renderSales(){
  const el=document.getElementById('sales-list');
  el.innerHTML=APP.sales.map(s=>`
    <div class="item">${s.date} - ${s.total}</div>
  `).join('');
}

/* WHATSAPP RECEIPT */
function whatsappReceipt(total){
  const msg=`Receipt\nTotal: GHS ${total}`;
  const url=`https://wa.me/?text=${encodeURIComponent(msg)}`;
  window.open(url);
}

/* INIT */
function renderAll(){
  renderStock();
  renderCart();
  renderSales();
}

function logout(){
  localStorage.clear();
  location.reload();
}

window.onload=boot;

</script>

</body>
</html>
