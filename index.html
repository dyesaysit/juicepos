<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JuicePOS</title>

<link rel="manifest" href="manifest.json">

<style>
body { font-family: Arial; margin:0; background:#f4f4f4; }
header { background:#006400; color:white; padding:12px; text-align:center; }
.container { padding:16px; }
button { padding:10px; margin:5px; border:none; border-radius:6px; }
.btn { background:#006400; color:white; }
.card { background:white; padding:12px; margin:10px 0; border-radius:8px; }
</style>

<!-- LIBRARIES -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<header>
<h2>JuicePOS (GMD)</h2>
</header>

<div class="container">

<input id="product" placeholder="Product name">
<input id="price" type="number" placeholder="Price">
<button class="btn" onclick="addItem()">Add</button>

<div id="cart"></div>

<h3 id="total">Total: GMD 0</h3>

<button class="btn" onclick="checkout()">Checkout</button>

</div>

<!-- RECEIPT MODAL -->
<div id="receiptModal" style="display:none; padding:20px; background:white;">
  <div class="receipt" id="receiptContent"></div>

  <button onclick="shareReceiptImage()">📤 WhatsApp Image</button>
  <button onclick="shareReceiptPDF()">📄 WhatsApp PDF</button>
</div>

<script>

// ================= STATE =================
let cart = [];

// ================= CART =================
function addItem() {
  const name = document.getElementById('product').value;
  const price = parseFloat(document.getElementById('price').value);

  if(!name || !price) return;

  cart.push({ name, price });
  renderCart();
}

function renderCart() {
  let html = "";
  let total = 0;

  cart.forEach(i=>{
    total += i.price;
    html += `<div class="card">${i.name} - GMD ${i.price}</div>`;
  });

  document.getElementById('cart').innerHTML = html;
  document.getElementById('total').innerText = "Total: GMD " + total.toFixed(2);
}

// ================= CHECKOUT =================
function checkout() {
  if(!cart.length) return;

  const total = cart.reduce((s,i)=>s+i.price,0);

  const receipt = `
    <h3>JuicePOS Receipt</h3>
    ${cart.map(i=>`<div>${i.name} - GMD ${i.price}</div>`).join('')}
    <hr>
    <strong>Total: GMD ${total.toFixed(2)}</strong>
  `;

  document.getElementById('receiptContent').innerHTML = receipt;
  document.getElementById('receiptModal').style.display = "block";

  saveSale(total);

  cart = [];
  renderCart();
}

// ================= SAVE (LOCAL) =================
function saveSale(total){
  let sales = JSON.parse(localStorage.getItem('sales')||"[]");
  sales.push({ total, date:new Date().toISOString() });
  localStorage.setItem('sales', JSON.stringify(sales));
}

// ================= WHATSAPP SHARE =================
async function shareReceiptImage() {
  const receipt = document.querySelector('.receipt');
  const canvas = await html2canvas(receipt);
  const img = canvas.toDataURL("image/png");

  const link = document.createElement('a');
  link.href = img;
  link.download = 'receipt.png';
  link.click();

  alert("Image saved. Share on WhatsApp.");
}

async function shareReceiptPDF() {
  const { jsPDF } = window.jspdf;
  const receipt = document.querySelector('.receipt');

  const canvas = await html2canvas(receipt);
  const img = canvas.toDataURL("image/png");

  const pdf = new jsPDF({
    orientation: 'portrait',
    unit: 'mm',
    format: [80, 200]
  });

  pdf.addImage(img, 'PNG', 0, 0, 80, 0);
  pdf.save("receipt.pdf");

  alert("PDF saved. Share on WhatsApp.");
}

// ================= SERVICE WORKER =================
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

</script>

</body>
</html>
